<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destination Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header>
      <nav class="container">
        <a href="/">Back to Bucket List</a>
        <strong>Travel Bucket List</strong>
      </nav>
    </header>

    <main class="container">
      <div id="destination-detail"></div>
    </main>

    <footer class="container">
      <p>Made by Zainab 2026</p>
    </footer>

    <script>
      async function loadDestination() {
        const slug = window.location.pathname.split('/').pop();
        const res = await fetch(`/api/destinations/${slug}`);

        if (!res.ok) {
          window.location.href = '/404';
          return;
        }

        const dest = await res.json();
        document.title = `${dest.name} | Travel Bucket List`;

        const detail = document.getElementById('destination-detail');
        detail.innerHTML = `
          <div class="detail-hero">
            <img src="${dest.image}" alt="${dest.name}" class="detail-image" />
          </div>
          <div class="detail-content">
            <div class="detail-header">
              <span class="detail-label">${dest.category}</span>
              <h1>${dest.name}</h1>
              <span class="badge">${dest.category}</span>
            </div>
            <div class="detail-meta">
              <div class="meta-card">
                <p>Country</p>
                <strong>${dest.country}</strong>
              </div>
              <div class="meta-card">
                <p>Estimated Cost</p>
                <strong>${dest.estimated_cost}</strong>
              </div>
              <div class="meta-card">
                <p>Best Season</p>
                <strong>${dest.best_season}</strong>
              </div>
            </div>
            <section>
              <h2>About</h2>
              <p>${dest.description}</p>
            </section>
            <section>
              <h2>Must Dos</h2>
              <p>${dest.must_dos}</p>
            </section>
            <section>
              <h2>Local Food</h2>
              <p>${dest.local_food}</p>
            </section>
            <section>
              <h2>Travel Tip</h2>
              <blockquote>${dest.travel_tip}</blockquote>
            </section>
          </div>
        `;
      }
      loadDestination();
    </script>
  </body>
</html>
