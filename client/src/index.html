<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Bucket List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header>
      <nav class="container">
        <strong>Travel Bucket List</strong>
      </nav>
    </header>

    <main class="container">
      <section class="hero">
        <span class="hero-label">A Collection of Dreams</span>
        <h1>The World is<br><em>Worth Seeing</em></h1>
        <div class="divider"></div>
        <p>Seven destinations that deserve a place on every traveler's list.</p>
      </section>

      <div class="search-wrap">
        <input
          type="text"
          id="search-input"
          placeholder="Search by destination or category..."
        />
      </div>

      <div id="destinations-grid" class="grid-container"></div>
    </main>

    <footer class="container">
      <p>Made by Zainab 2026</p>
    </footer>

    <script>
      let allDestinations = [];

      async function loadDestinations() {
        const res = await fetch('/api/destinations');
        allDestinations = await res.json();
        renderCards(allDestinations);
      }

      function renderCards(destinations) {
        const grid = document.getElementById('destinations-grid');

        if (destinations.length === 0) {
          grid.innerHTML = '<p class="no-results">No destinations found. Try a different search.</p>';
          return;
        }

        grid.innerHTML = destinations.map((dest, index) => `
          <a href="/destinations/${dest.slug}" class="card">
            <div class="card-image-wrap">
              <img src="${dest.image}" alt="${dest.name}" />
              <span class="card-number">0${index + 1}</span>
            </div>
            <div class="card-body">
              <p class="category">${dest.category} &middot; ${dest.country}</p>
              <h2>${dest.name}</h2>
              <p class="description">${dest.description.substring(0, 120)}...</p>
              <div class="card-footer">
                <span class="cost">${dest.estimated_cost}</span>
                <span class="season">${dest.best_season}</span>
              </div>
              <span class="card-cta">Explore destination &rarr;</span>
            </div>
          </a>
        `).join('');
      }

      document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allDestinations.filter(dest =>
          dest.name.toLowerCase().includes(query) ||
          dest.category.toLowerCase().includes(query) ||
          dest.country.toLowerCase().includes(query)
        );
        renderCards(filtered);
      });

      loadDestinations();
    </script>
  </body>
</html>
