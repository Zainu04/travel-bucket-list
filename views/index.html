<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Bucket List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header>
      <nav class="container">
        <strong>✈️ Travel Bucket List</strong>
      </nav>
    </header>

    <main class="container">
      <section class="hero">
        <h1>My Travel Bucket List 🌍</h1>
        <p>A curated collection of dream destinations worth exploring before you die.</p>
      </section>

      <div id="destinations-grid" class="grid-container">
        <!-- Cards injected by JS -->
      </div>
    </main>

    <footer class="container">
      <p>Made with ❤️ | Travel Bucket List 2024</p>
    </footer>

    <script>
      async function loadDestinations() {
        const res = await fetch('/api/destinations');
        const destinations = await res.json();

        const grid = document.getElementById('destinations-grid');

        grid.innerHTML = destinations.map(dest => `
          <a href="/destinations/${dest.slug}" class="card">
            <img src="${dest.image}" alt="${dest.name}" />
            <div class="card-body">
              <h2>${dest.name}</h2>
              <p class="category">${dest.category} · ${dest.country}</p>
              <p class="description">${dest.description.substring(0, 120)}...</p>
              <div class="card-footer">
                <span class="cost">💰 ${dest.estimatedCost}</span>
                <span class="season">🗓 ${dest.bestSeason}</span>
              </div>
            </div>
          </a>
        `).join('');
      }

      loadDestinations();
    </script>
  </body>
</html>
